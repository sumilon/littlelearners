server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml;

    # Cache hashed static assets forever (Vite fingerprints them)
    location ~* /assets/.*\.(js|css|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PWA files — no caching so updates are picked up immediately
    location ~* \.(webmanifest|json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /service-worker.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # All other requests → index.html (SPA client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
